<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRISM AGENCY - Анкета</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">◆ PRISM AGENCY</div>
            <h1>Анкета кандидата</h1>
            
            <form id="applicationForm">
                <input type="text" name="fio" placeholder="ФИО полностью" required>
                <input type="text" name="birth" placeholder="ДД.ММ.ГГГГ" required>
                <input type="tel" name="phone" placeholder="Телефон" required>
                <input type="text" name="telegram" placeholder="Telegram (username)" required>
                
                <div class="label">📱 Каким смартфоном пользуетесь?</div>
                <div class="device-selector">
                    <label class="device-card active">
                        <input type="radio" name="device" value="iPhone" checked>
                        <span>🍏 iPhone</span>
                    </label>
                    <label class="device-card">
                        <input type="radio" name="device" value="Android">
                        <span>🤖 Android</span>
                    </label>
                </div>
                
                <div class="label">💼 Есть ли у вас опыт?</div>
                <select name="experience">
                    <option>Нет опыта</option>
                    <option>Есть опыт</option>
                </select>
                
                <div class="label">⏰ Сколько времени готовы уделять работе?</div>
                <select name="time">
                    <option>2-4 часа</option>
                    <option>4-6 часов</option>
                    <option>6-8 часов</option>
                    <option>8+ часов</option>
                </select>
                
                <button type="submit">🚀 Отправить заявку</button>
            </form>
        </div>
    </div>

    <div class="success-screen" id="successScreen">
        <div class="success-box">
            <div class="success-icon">✅</div>
            <h2>Заявка отправлена!</h2>
            <p>Спасибо! Мы получили вашу заявку.</p>
            <div class="track-title">Ваш HR-код:</div>
            <div class="track-code" id="trackCode">----</div>
            <p class="manager-text">Наш менеджер свяжется с вами в Telegram в ближайшее время</p>
            <button class="close-btn" onclick="location.reload()">Закрыть</button>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
